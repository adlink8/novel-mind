services:
  # PostgreSQL + pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: novelmind
      POSTGRES_USER: novelmind
      POSTGRES_PASSWORD: novelmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Chroma 向量数据库（RAG 检索）
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000

  # Neo4j 图数据库（人物关系图谱，MVP 阶段可选）
  # 启用: docker compose --profile graph up -d
  neo4j:
    profiles: ["graph"]
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/novelmind
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  chromadata:
  neo4jdata:
