# =============================================================================
# Alembic 数据库迁移配置文件
# =============================================================================
# Alembic 是 SQLAlchemy 的数据库迁移工具，用于管理数据库 schema 的版本变更。
# 本配置文件定义了迁移脚本的位置、数据库连接、日志格式等关键参数。
#
# 重要: sqlalchemy.url 在本文件中仅为占位符，实际值由 env.py 从应用配置动态读取。
# =============================================================================

# A generic, single database configuration.

[alembic]

# 迁移脚本目录路径（相对于本 ini 文件）
# 脚本目录包含: versions/ (迁移版本)、env.py (环境配置)、script.py.mako (模板)
script_location = %(here)s/migrations

# 迁移文件命名模板（默认使用 revision_id + slug）
# 取消注释可使用日期前缀命名，便于按时间排序
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 将当前目录加入 sys.path，确保能导入项目模块（如 app.models）
prepend_sys_path = .

# 迁移文件中日期的时区（留空表示使用服务器本地时间）
# 若需指定时区，需安装 tzdata 库: pip install alembic[tz]
# timezone =

# slug 字段最大长度（迁移文件名中的描述性部分）
# truncate_slug_length = 40

# 是否在 revision 命令时也运行 env.py（通常为 false）
# revision_environment = false

# 是否允许 .pyc/.pyo 文件作为迁移版本（通常为 false，避免误识别）
# sourceless = false

# 路径分隔符，用于分隔 version_locations 中的多个路径
# os = 使用操作系统默认分隔符（Windows: ;，Linux/macOS: :）
path_separator = os

# 是否递归搜索 version_locations 子目录中的迁移文件
# recursive_version_locations = false

# 迁移脚本的输出编码
# output_encoding = utf-8

# 数据库连接 URL（占位符，实际值由 env.py 从 app.config.settings 读取）
# env.py 会将 asyncpg 异步驱动转换为 psycopg2 同步驱动供 Alembic 使用
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# 迁移文件生成后自动执行的钩子脚本
# 可用于自动格式化（black）或代码检查（ruff）

# 示例: 使用 black 格式化迁移文件
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# 示例: 使用 ruff 检查迁移文件
# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME


# =============================================================================
# 日志配置
# =============================================================================
# 控制 Alembic 和 SQLAlchemy 的日志输出级别和格式

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

# 根日志器 - WARNING 级别，避免过多输出
[logger_root]
level = WARNING
handlers = console
qualname =

# SQLAlchemy 日志器 - WARNING 级别
# 调试时可改为 INFO 查看生成的 SQL 语句
[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

# Alembic 日志器 - INFO 级别，显示迁移执行进度
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# 控制台日志处理器
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

# 日志格式: 级别对齐(5字符) [日志器名] 消息内容
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
